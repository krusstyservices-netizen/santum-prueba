<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SANTUM</title>

<style>
body {
  margin: 0;
  background: black;
  color: gold;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* MATRIX CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* NAVBAR */
.nav {
  position: fixed;
  top: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  z-index: 10;
}

.nav a {
  color: #FFA500;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  padding: 8px 16px;
  border: 1px solid #FFA500;
  transition: 0.3s;
}

.nav a:hover {
  background: #FFA500;
  color: black;
  box-shadow: 0 0 10px #FFA500;
}

/* CENTER CONTENT */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* TITLE */
.title {
  font-size: 80px;
  color: #FFD700;
  text-shadow: 
    0 0 10px #FFD700,
    0 0 20px #FFA500,
    0 0 40px #FF8C00;
}

/* SUBTEXT */
.subtitle {
  margin-top: 10px;
  letter-spacing: 4px;
  color: #FFA500;
}

/* BOX */
.box {
  margin-top: 20px;
  padding: 10px 20px;
  border: 1px solid #FFA500;
  display: inline-block;
  color: #FFA500;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#">HOME</a>
  <a href="#">PRODUCTS</a>
  <a href="#">DISCORD</a>
</div>

<!-- CENTER CONTENT -->
<div class="center">
  <div class="title">SANTUM</div>
  <div class="subtitle">QUALITY FIRST</div>
  <div class="box">SUPPORT DISCORD</div>
</div>

<!-- MATRIX SCRIPT -->
<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) {
  drops[x] = 1;
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#FFA500"; // ORANGE MATRIX
  ctx.shadowColor = "#FFA500";
  ctx.shadowBlur = 8;
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
